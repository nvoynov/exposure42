<!DOCTYPE html>
<html lang="$if(lang)$$lang$$else$en$endif$">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Standard Primary SEO Layer -->
  <title>$if(title)$$title$ | $site_title$$else$$site_title$$endif$</title>
  $if(description)$<meta name="description" content="$description$">$endif$
  
  <!-- Absolute Canonical Anchor: Automated by Rake and calculated per page model -->
  <link rel="canonical" href="$canonical_url$">  
  
  <!-- Open Graph / Facebook Production Layer -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="$canonical_url$">
  <meta property="og:title" content="$if(title)$$title$ | $site_title$$else$$site_title$$endif$">
  <meta property="og:description" content="$description$">
  <!-- <meta property="og:image" content="$site_url$$root_path$/assets/og_image.png"> -->
$if(og_image)$
  <meta property="og:image" content="$site_url$$root_path$$og_image$">
$else$
  <meta property="og:image" content="$site_url$$root_path$/assets/og_image.png">
$endif$


  <!-- Branding Visual Identities Core Assets -->
  <link rel="icon" type="image/svg+xml" href="$root_path$/assets/favicon.svg">
  <!-- 2. Dynamic root path injection for the master stylesheet -->
  <link rel="stylesheet" href="$root_path$/assets/css/style.css">
</head>

<body>
  <div class="site-container">
    <header class="site-header">
      <div class="site-title">
        <div class="site-title-text">
          <a href="/index.html">
            Nikolay Voynov
            <img src="/assets/glyph.svg" class="header-divider-icon" alt="" />
            Exposure
          </a>
        </div>
      </div>

      <!-- Core site navigation links with injected paths -->
      <nav class="site-nav">
        <!-- 5. Dynamic root path injection for navigation mapping -->
        <a href="$root_path$/index.html" class="nav-link">Home</a>
        <a href="$root_path$/series.html" class="nav-link">Series</a>
        <a href="$root_path$/about.html" class="nav-link">About</a>
      </nav>
    </header>

    <main class="content-container">
      <!-- Native Markdown text output channel compiled by Pandoc -->
      <div class="page-main-body-content">
        $body$
      </div>

      <!-- Pandoc native body injection channel -->
      $include-before$
    </main>

    <footer>
      <p>&copy; 2026 $author$. All rights reserved.</p>
      <p style="font-size: 0.75rem; opacity: 0.6; margin-top: 5px;">
        No images or text on this site may be reproduced or transmitted 
        in any form without prior written permission.
      </p>
    </footer>

    <!-- Progressive Web App Caching Lifecycle Activation -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('==> [PWA Engine] ServiceWorker successfully registered:', reg.scope))
            .catch(err => console.error('--> [PWA Engine] ServiceWorker registration failed:', err));
        });
      }
    </script>
  </div>
</body>
</html>
