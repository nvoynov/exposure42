<!-- src/lightbox_fragment.html - Pure Right Top Column Configuration -->
<div id="lightbox" class="lightbox-overlay">
  
  <!-- Isolated Left Field Navigation Arrow -->
  <button id="lightbox-prev-btn" class="lightbox-btn lightbox-nav-arrow lightbox-arrow-left" aria-label="Previous photograph">
    <svg width="36" height="36"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>

  <!-- Central Photography Exhibition Stage Area -->
  <div class="lightbox-stage">
    <img id="lightbox-img" src="" alt="Fine-Art Photograph" draggable="false">
  </div>

  <!-- THE UNIFIED UPPER-RIGHT VERTICAL OPTIONS BLOCK -->
  <div class="lightbox-options-vertical-rack">
    <!-- Position 1: Clean Close Presentation Modal Trigger -->
    <button id="lightbox-close-btn" class="lightbox-btn" aria-label="Close presentation">
      <svg width="26" height="26"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>

    <!-- Position 2: Toggle Fullscreen Canvas Layout Mode -->
    <button id="fullscreen-btn" class="lightbox-btn" title="Toggle Fullscreen View (F)">
      <svg width="22" height="22"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
    </button>

    <!-- Position 3: Direct Share Link Copy To Clipboard Action -->
    <button id="copy-link-btn" class="lightbox-btn" title="Copy Direct Photographic Link">
      <svg width="22" height="22"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
    </button>
  </div>

  <!-- Isolated Right Field Navigation Arrow -->
  <button id="lightbox-next-btn" class="lightbox-btn lightbox-nav-arrow lightbox-arrow-right" aria-label="Next photograph">
    <svg width="36" height="36"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>

  <div id="lightbox-toast" class="lightbox-toast-alert">Link copied to clipboard</div>
</div>

<script src="/assets/js/lightbox.js" defer></script>
