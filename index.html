<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Standard Primary SEO Layer -->
  <title>Nikolay Voynov Exposure</title>
  <meta name="description" content="Personal photography portfolio and
series visual exploration.">
  
  <!-- Absolute Canonical Anchor: Automated by Rake and calculated per page model -->
  <link rel="canonical" href="https://nvoynov.github.io/exposure42/">  
  
  <!-- Open Graph / Facebook Production Layer -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nvoynov.github.io/exposure42/">
  <meta property="og:title" content="Nikolay Voynov Exposure">
  <meta property="og:description" content="Personal photography
portfolio and series visual exploration.">
  <meta property="og:image" content="/exposure42/assets/og_image.png">

  <!-- Branding Visual Identities Core Assets -->
  <link rel="icon" type="image/svg+xml" href="/exposure42/assets/favicon.svg">
  <!-- 2. Dynamic root path injection for the master stylesheet -->
  <link rel="stylesheet" href="/exposure42/assets/css/style.css">
</head>

<body>
  
  <div class="site-container">
    <header class="site-header">
      <div class="site-title">
        <div class="site-title-text">
          <a href="/exposure42/index.html">
            Nikolay Voynov
            <img src="/exposure42/assets/glyph.svg" class="header-divider-icon" alt="" />
            Exposure
          </a>
        </div>
      </div>

      <!-- Core site navigation links with injected paths -->
      <nav class="site-nav">
        <!-- 5. Dynamic root path injection for navigation mapping -->
        <a href="/exposure42/index.html" class="nav-link">Home</a>
        <a href="/exposure42/series.html" class="nav-link">Series</a>
        <a href="/exposure42/about.html" class="nav-link">About</a>
      </nav>
    </header>

    <!-- Pandoc native body injection channel -->
    

    <main class="content-container">
      <!-- Native Markdown text output channel compiled by Pandoc -->
      <div class="page-main-body-content">
        <!-- Structural viewport boundary for the dynamic mosaic calculations -->
        <div class="canvas-wrapper">
        <div id="mosaic-grid" class="mosaic-grid">

        </div>
        </div>
        <script src="assets/js/lightbox.js" defer></script>
        <script src="assets/js/mosaic.js" defer></script>
      </div>
    </main>

    <!-- Pandoc native body injection channel -->
    <!-- src/lightbox_fragment.html - Pure Right Top Column Configuration -->
    <div id="lightbox" class="lightbox-overlay">
      
      <!-- Isolated Left Field Navigation Arrow -->
      <button id="lightbox-prev-btn" class="lightbox-btn lightbox-nav-arrow lightbox-arrow-left" aria-label="Previous photograph">
        <svg width="36" height="36"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>

      <!-- Central Photography Exhibition Stage Area -->
      <div class="lightbox-stage">
        <img id="lightbox-img" src="" alt="Fine-Art Photograph" draggable="false">
      </div>

      <!-- THE UNIFIED UPPER-RIGHT VERTICAL OPTIONS BLOCK -->
      <div class="lightbox-options-vertical-rack">
        <!-- Position 1: Clean Close Presentation Modal Trigger -->
        <button id="lightbox-close-btn" class="lightbox-btn" aria-label="Close presentation">
          <svg width="26" height="26"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>

        <!-- Position 2: Toggle Fullscreen Canvas Layout Mode -->
        <button id="fullscreen-btn" class="lightbox-btn" title="Toggle Fullscreen View (F)">
          <svg width="22" height="22"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </button>

        <!-- Position 3: Direct Share Link Copy To Clipboard Action -->
        <button id="copy-link-btn" class="lightbox-btn" title="Copy Direct Photographic Link">
          <svg width="22" height="22"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        </button>
      </div>

      <!-- Isolated Right Field Navigation Arrow -->
      <button id="lightbox-next-btn" class="lightbox-btn lightbox-nav-arrow lightbox-arrow-right" aria-label="Next photograph">
        <svg width="36" height="36"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>

      <div id="lightbox-toast" class="lightbox-toast-alert">Link copied to clipboard</div>
    </div>


    <footer>
      <p>&copy; 2026 Nikolay Voynov. All rights reserved.</p>
      <p style="font-size: 0.75rem; opacity: 0.6; margin-top: 5px;">
        No images or text on this site may be reproduced or transmitted 
        in any form without prior written permission.
      </p>
    </footer>

    <!-- Progressive Web App Caching Lifecycle Activation -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/exposure42/sw.js')
            .then(reg => console.log('==> [PWA Engine] ServiceWorker successfully registered:', reg.scope))
            .catch(err => console.error('--> [PWA Engine] ServiceWorker registration failed:', err));
        });
      }
    </script>
  </div>
</body>
</html>
